name: Deploy to AWS (S3 + CloudFront)

# Auto-deploy the Rotem Shani simulation on every push to main.
# Auth is via GitHub OIDC assuming an IAM role — no AWS keys stored in the repo.
# The heavy .glb models live in Git LFS and are pulled ONLY when they actually
# change, so ordinary HTML/JSON edits don't burn LFS bandwidth.

on:
  push:
    branches: [main]
    paths:
      - 'simulation/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: deploy-rotem-shani
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

env:
  AWS_REGION: us-east-1
  ROLE_ARN: arn:aws:iam::824980746386:role/parking-sim-github-deploy
  BUCKET: parking-sim-frontend-824980746386
  DIST_ID: E2QO66F9BFH2JK
  PREFIX: rotem-shani

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no LFS smudge yet)
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 2   # need the previous commit to detect model changes

      - name: Detect whether the 3D models changed
        id: models
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^simulation/models/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Models changed — will pull LFS and sync them."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No model change — skipping the ~183MB LFS pull."
          fi

      - name: Pull model LFS objects (only when they changed)
        if: steps.models.outputs.changed == 'true'
        run: git lfs pull --include="simulation/models/**"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync site (HTML / JSON / images) — never touches the models
        run: |
          aws s3 sync simulation/ "s3://${BUCKET}/${PREFIX}/" --delete \
            --exclude "models/*" \
            --exclude "*.backup*.json" --exclude "serve.py" --exclude "SUMMARY.md"

      - name: Publish the root redirect (bare CloudFront URL -> the simulation)
        run: |
          printf '%s' '<!doctype html><meta charset="utf-8"><title>Parking Sim</title><meta http-equiv="refresh" content="0; url=rotem-shani/rotem-shani.html"><a href="rotem-shani/rotem-shani.html">Rotem Shani — Robotic Parking Simulation</a>' > index.html
          aws s3 cp index.html "s3://${BUCKET}/index.html" --content-type "text/html; charset=utf-8"

      - name: Sync models (only when they changed) + set glb content-type
        if: steps.models.outputs.changed == 'true'
        run: |
          aws s3 sync simulation/models/ "s3://${BUCKET}/${PREFIX}/models/" --delete
          aws s3 cp "s3://${BUCKET}/${PREFIX}/models/" "s3://${BUCKET}/${PREFIX}/models/" \
            --recursive --exclude "*" --include "*.glb" \
            --content-type "model/gltf-binary" --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

      - name: Summary
        run: |
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "Site: https://dmfotw8kwayzt.cloudfront.net/${PREFIX}/rotem-shani.html" >> "$GITHUB_STEP_SUMMARY"
          echo "Models re-synced: ${{ steps.models.outputs.changed }}" >> "$GITHUB_STEP_SUMMARY"
