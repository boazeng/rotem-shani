<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול מערכת — רותם שני</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0e1a'/%3E%3Cg fill='%2322c55e'%3E%3Cpath d='M10 40c0-2 1-3 3-3l4-9c1-2 3-4 6-4h18c3 0 5 2 6 4l4 9c2 0 3 1 3 3v6a2 2 0 0 1-2 2h-3a5 5 0 0 1-10 0H25a5 5 0 0 1-10 0h-3a2 2 0 0 1-2-2z'/%3E%3C/g%3E%3C/svg%3E" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
    :root{--primary:#1F3A5F;--primary-soft:rgba(31,58,95,.07);--accent:#D64A2E;--pos:#2F8F5B;
      --ink:#1C1B19;--bg:#FAF9F5;--white:#FFFEFB;--text:#2A2A28;--muted:#706A60;--border:#E7E2D6;}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Heebo',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:18px;height:64px;padding:0 24px;
      background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(28,27,25,.04)}
    .logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.2rem;letter-spacing:.04em;direction:ltr}
    .logo b{color:var(--accent)}
    .nav{display:flex;gap:4px;margin-inline-start:auto}
    .nav a{padding:8px 15px;border-radius:999px;font-size:.9rem;font-weight:500;color:var(--muted);transition:.15s}
    .nav a:hover{background:rgba(31,58,95,.12);color:var(--primary)}
    .nav a.active{background:var(--primary);color:var(--white)}
    .nav a.out{color:var(--accent)}
    .wrap{max-width:1080px;margin:32px auto;padding:0 24px}
    h1{font-size:1.8rem;font-weight:800;color:var(--primary)}
    .sub{color:var(--muted);margin:2px 0 26px}
    .card{background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 12px rgba(28,27,25,.06);overflow:hidden}
    .card-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
    .card-h h2{font-size:1.1rem;color:var(--primary)}
    table{width:100%;border-collapse:collapse}
    thead th{text-align:right;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;
      letter-spacing:.03em;padding:11px 20px;background:var(--primary-soft)}
    tbody td{padding:12px 20px;border-top:1px solid var(--border);font-size:.92rem;vertical-align:middle}
    tbody tr:hover{background:var(--primary-soft)}
    .em{font-family:'Space Grotesk',sans-serif}
    select,input{font:inherit;font-size:.88rem;padding:6px 9px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--text)}
    select:focus,input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
    .badge{font-size:.72rem;font-weight:700;padding:3px 11px;border-radius:999px}
    .b-admin{background:rgba(214,74,46,.12);color:var(--accent)}
    .b-approver{background:var(--primary-soft);color:var(--primary)}
    .b-user{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
    .b-on{background:rgba(47,143,91,.12);color:var(--pos)}
    .b-off{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
    .btn{font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:7px 15px;border-radius:9px;border:1px solid transparent;transition:.15s}
    .btn-p{background:var(--primary);color:var(--white)}
    .btn-p:hover{filter:brightness(1.08)}
    .btn-g{background:var(--white);color:var(--primary);border-color:var(--border)}
    .btn-g:hover{border-color:var(--primary)}
    .btn-d{color:var(--accent);background:transparent;border-color:transparent}
    .btn-d:hover{background:rgba(214,74,46,.1)}
    .add{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:16px 20px;background:var(--primary-soft)}
    .add input{min-width:210px}
    #msg{margin:14px 0;font-size:.9rem;min-height:1.2em}
    #msg.ok{color:var(--pos)} #msg.err{color:var(--accent)}
    .me{font-size:.8rem;color:var(--muted)}
  </style>
</head>
<body>
  <header class="bar">
    <span class="logo">T<b>·</b>A<b>·</b>C<b>·</b>T</span>
    <span class="me" id="whoami"></span>
    <nav class="nav">
      <a href="/sim/rotem-shani.html">סימולציה</a>
      <a href="/dashboard/">לוח בקרה</a>
      <a href="/manage" class="active">ניהול מערכת</a>
      <a href="/admin-only">עמוד מנהל</a>
      <a href="/logout" class="out">יציאה</a>
    </nav>
  </header>

  <main class="wrap">
    <h1>ניהול מערכת</h1>
    <div class="sub">ניהול משתמשים והרשאות · גישה למנהלי מערכת בלבד</div>

    <div id="msg"></div>

    <section class="card">
      <div class="card-h"><h2>משתמשים מורשים</h2><span class="me" id="count"></span></div>
      <div class="add">
        <input id="newEmail" type="email" placeholder="אימייל (Gmail) חדש…" />
        <input id="newName" type="text" placeholder="שם (אופציונלי)" />
        <select id="newRole">
          <option value="user">user — צפייה</option>
          <option value="approver">approver — מאשר</option>
          <option value="admin">admin — מנהל</option>
        </select>
        <button class="btn btn-p" onclick="addUser()">+ הוסף משתמש</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>אימייל</th><th>שם</th><th>תפקיד</th><th>סטטוס</th><th>כניסה אחרונה</th><th style="text-align:left">פעולות</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    let ME = null;
    const $ = s => document.querySelector(s);
    function msg(t, ok){ const m=$('#msg'); m.textContent=t; m.className = ok?'ok':'err'; if(t) setTimeout(()=>{if(m.textContent===t){m.textContent='';m.className='';}}, 4000); }
    const roleBadge = r => `<span class="badge b-${r}">${r}</span>`;
    const fmtDate = s => s ? new Date(s.replace(' ','T')+'Z').toLocaleString('he-IL',{dateStyle:'short',timeStyle:'short'}) : '—';

    async function api(url, opts){
      const r = await fetch(url, Object.assign({headers:{'Content-Type':'application/json'}}, opts||{}));
      let body = {}; try{ body = await r.json(); }catch(e){}
      if(!r.ok) throw new Error(body.detail || body.error || ('שגיאה ' + r.status));
      return body;
    }

    async function load(){
      const me = await api('/auth/me'); ME = me;
      $('#whoami').textContent = me.email ? `מחובר: ${me.email} (${me.role})` : '';
      const { users, roles } = await api('/auth/users');
      $('#count').textContent = users.length + ' משתמשים';
      $('#rows').innerHTML = users.map(u => rowHtml(u, roles)).join('');
    }

    function rowHtml(u, roles){
      const self = ME && u.email === ME.email;
      const roleSel = `<select onchange="setRole('${u.email}', this.value)" ${self?'disabled':''}>`+
        roles.map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${r}</option>`).join('')+`</select>`;
      const activeBtn = `<button class="btn btn-g" onclick="toggleActive('${u.email}', ${u.active?0:1})" ${self?'disabled':''}>`+
        (u.active?'השבת':'הפעל')+`</button>`;
      const delBtn = self?'' : `<button class="btn btn-d" onclick="delUser('${u.email}')">מחק</button>`;
      return `<tr>
        <td class="em">${u.email}${self?' <span class="me">(אתה)</span>':''}</td>
        <td>${u.name||'—'}</td>
        <td>${self?roleBadge(u.role):roleSel}</td>
        <td><span class="badge ${u.active?'b-on':'b-off'}">${u.active?'פעיל':'מושבת'}</span></td>
        <td class="em">${fmtDate(u.last_login_at)}</td>
        <td style="text-align:left;white-space:nowrap">${activeBtn} ${delBtn}</td>
      </tr>`;
    }

    async function save(u){ await api('/auth/users', {method:'POST', body:JSON.stringify(u)}); }
    async function setRole(email, role){ const u = await getUser(email); try{ await save({email, role, name:u.name, active:u.active}); msg('התפקיד עודכן ✓', true); load(); }catch(e){ msg(e.message,false); load(); } }
    async function toggleActive(email, active){ const u = await getUser(email); try{ await save({email, role:u.role, name:u.name, active:!!active}); msg('הסטטוס עודכן ✓', true); load(); }catch(e){ msg(e.message,false); load(); } }
    async function getUser(email){ const {users}=await api('/auth/users'); return users.find(x=>x.email===email)||{}; }
    async function addUser(){
      const email=$('#newEmail').value.trim(), name=$('#newName').value.trim(), role=$('#newRole').value;
      if(!email || !email.includes('@')){ msg('אימייל לא תקין', false); return; }
      try{ await save({email, role, name, active:true}); $('#newEmail').value=''; $('#newName').value=''; msg('המשתמש נוסף ✓', true); load(); }
      catch(e){ msg(e.message, false); }
    }
    async function delUser(email){
      if(!confirm('למחוק את '+email+'?')) return;
      try{ await api('/auth/users/delete', {method:'POST', body:JSON.stringify({email})}); msg('נמחק ✓', true); load(); }
      catch(e){ msg(e.message, false); }
    }

    load().catch(e => msg('טעינה נכשלה: ' + e.message, false));
  </script>
</body>
</html>
